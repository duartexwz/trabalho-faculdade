<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Tecno Brasília</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="/front/assets/style.css" rel="stylesheet">
</head>
<body data-page="login">
  <div id="navbar-mount"></div>
  <main style="padding-top:100px">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4 shadow">
            <h3 class="text-center mb-4"><i class="fas fa-user-circle text-primary"></i> Entrar</h3>

            <!-- Resultado do login (erro) -->
            <div id="resultado-login" class="mb-3 d-none"></div>

            <form id="form-login" novalidate>
              <div class="mb-3"><label class="form-label">E-mail *</label>
                <input type="email" name="username" class="form-control" required></div>
              <div class="mb-3"><label class="form-label">Senha *</label>
                <input type="password" name="password" class="form-control" required></div>
              <button class="btn btn-primary w-100" type="submit">Entrar</button>
              <p class="text-center mt-3 mb-0 small">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/front/static/api.js"></script>
  <script src="/front/static/main.js"></script>
  <script>
    mountLayout('login');
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      if (!validateRequired(e.target)) return;

      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      const fd = new FormData(form);

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        await API.login(fd.get('username'), fd.get('password'));
        // Tenta descobrir o usuário (admin ou aluno)
        let acesso = 'comum';
        try {
          const adm = await API.getAdmin ? null : await API.request('/admin/?username=' + encodeURIComponent(fd.get('username')));
          if (adm && adm.admin && adm.admin.length) {
            API.setUser(adm.admin[0]); acesso = adm.admin[0].acesso;
          }
        } catch {}
        if (acesso === 'comum') {
          try {
            const al = await API.request('/usuarios/?username=' + encodeURIComponent(fd.get('username')));
            if (al && al.alunos && al.alunos.length) API.setUser(al.alunos[0]);
          } catch {}
        }
        const u = API.user();
        showToast('Login realizado com sucesso!', 'success', { duration: 1500 });
        setTimeout(() => {
          if (u && (u.acesso === 'admin' || u.acesso === 'administrador')) window.location.href = 'admin.html';
          else window.location.href = 'index.html';
        }, 400);
      } catch (err) {
        showInlineMessage(
          '#resultado-login',
          `<strong>Não foi possível entrar.</strong><br>Verifique seu e-mail e senha e tente novamente.`,
          'error'
        );
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
