<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contato - Tecno Brasília</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="/front/assets/style.css" rel="stylesheet">
</head>
<body data-page="contato">
  <div id="navbar-mount"></div>
  <main style="padding-top:100px">
    <div class="container">
      <div class="section-title"><h2>Fale conosco</h2><p>Tire suas dúvidas ou agende uma visita.</p></div>

      <!-- Resultado do envio da mensagem -->
      <div id="resultado-contato" class="mb-4 d-none"></div>

      <div class="row g-4">
        <div class="col-md-6">
          <form id="form-contato" novalidate>
            <div class="mb-3"><label class="form-label">Nome *</label>
              <input type="text" name="nome" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">E-mail *</label>
              <input type="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Telefone</label>
              <input type="text" name="tel" class="form-control" data-mask="tel"></div>
            <div class="mb-3"><label class="form-label">CEP</label>
              <input type="text" name="cep" class="form-control" data-mask="cep"></div>
            <div class="mb-3"><label class="form-label">Mensagem *</label>
              <textarea name="msg" class="form-control" rows="4" required></textarea></div>
            <button class="btn btn-primary" type="submit"><i class="fas fa-paper-plane me-2"></i>Enviar</button>
          </form>
        </div>
        <div class="col-md-6">
          <h5>Onde estamos</h5>
          <p><i class="fas fa-map-marker-alt text-primary me-2"></i>SCS Quadra 02, Brasília-DF</p>
          <p><i class="fas fa-phone text-primary me-2"></i>(61) 3000-0000</p>
          <p><i class="fas fa-envelope text-primary me-2"></i>contato@tecnobrasilia.com</p>
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d245805.94830149452!2d-48.04199!2d-15.793889!3m2!1i1024!2i768!4f13.1" width="100%" height="300" style="border:0" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/api.js"></script>
  <script src="/static/main.js"></script>
  <script>
    mountLayout('contato');
    applyMasks();
    document.getElementById('form-contato').addEventListener('submit', e => {
      e.preventDefault();
      if (!validateRequired(e.target)) return;
      showInlineMessage(
        '#resultado-contato',
        '<strong>Mensagem enviada!</strong> Entraremos em contato em breve.',
        'success'
      );
      e.target.reset();
      document.getElementById('resultado-contato').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  </script>
</body>
</html>
