<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Tecno Brasília</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="/front/assets/style.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div id="navbar-mount"></div>
  <main style="padding-top:100px">
    <div class="container">
      <div class="section-title"><h2>Painel Administrativo</h2></div>
      <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-cursos">Cursos</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-alunos">Alunos</button></li>
      </ul>
      <div class="tab-content">
        <!-- CURSOS -->
        <div class="tab-pane fade show active" id="tab-cursos">
          <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modal-curso" onclick="resetCursoForm()"><i class="fas fa-plus"></i> Novo Curso</button>
          <div class="table-responsive"><table class="table table-striped">
            <thead><tr><th>ID</th><th>Curso</th><th>Categoria</th><th>Nível</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="tbody-cursos"></tbody>
          </table></div>
        </div>
        <!-- ALUNOS -->
        <div class="tab-pane fade" id="tab-alunos">
          <div class="table-responsive"><table class="table table-striped">
            <thead><tr><th>ID</th><th>Nome</th><th>E-mail</th><th>CPF</th><th>Ações</th></tr></thead>
            <tbody id="tbody-alunos"></tbody>
          </table></div>
        </div>
      </div>
    </div>
    <!-- MODAL CURSO -->
    <div class="modal fade" id="modal-curso" tabindex="-1">
      <div class="modal-dialog modal-lg"><div class="modal-content">
        <form id="form-curso" novalidate>
          <div class="modal-header"><h5 class="modal-title">Curso</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <input type="hidden" name="id">
            <div class="row g-3">
              <div class="col-md-8"><label class="form-label">Nome *</label><input type="text" name="curso" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Carga horária *</label><input type="number" name="carga_horaria" class="form-control" required></div>
              <div class="col-12"><label class="form-label">Descrição *</label><textarea name="descricao" class="form-control" required></textarea></div>
              <div class="col-md-4"><label class="form-label">Nível *</label>
                <select name="nivel" class="form-select" required><option>Iniciante</option><option>Intermediário</option><option>Avançado</option></select></div>
              <div class="col-md-4"><label class="form-label">Categoria *</label><input type="text" name="categoria" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Preço *</label><input type="number" step="0.01" name="preco" class="form-control" required></div>
              <div class="col-md-8"><label class="form-label">Imagem (URL)</label><input type="text" name="imagem" class="form-control"></div>
              <div class="col-md-4"><label class="form-label">Status</label>
                <select name="status" class="form-select"><option>ativo</option><option>inativo</option></select></div>
            </div>
          </div>
          <div class="modal-footer"><button class="btn btn-primary" type="submit">Salvar</button></div>
        </form>
      </div></div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/api.js"></script>
  <script src="/static/main.js"></script>
  <script>
    mountLayout('admin');
    if (!API.token()) {
      showToast('Faça login como administrador para acessar este painel.', 'warning', { duration: 2500 });
      setTimeout(() => location.href = 'login.html', 800);
    }
    async function loadCursos() {
      try {
        const data = await API.getCursos({ limit: 100 });
        document.getElementById('tbody-cursos').innerHTML = (data.cursos || []).map(c => `
          <tr><td>${c.id}</td><td>${c.curso}</td><td>${c.categoria}</td><td>${c.nivel}</td><td>${brl(c.preco)}</td><td>${c.status}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick='editCurso(${JSON.stringify(c).replace(/'/g,"&apos;")})'><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="delCurso(${c.id})"><i class="fas fa-trash"></i></button>
          </td></tr>`).join('');
      } catch(e) { showToast(`Erro ao carregar cursos: ${e.message}`, 'error'); }
    }
    async function loadAlunos() {
      try {
        const data = await API.getAlunos({ limit: 100 });
        document.getElementById('tbody-alunos').innerHTML = (data.alunos || []).map(a => `
          <tr><td>${a.id}</td><td>${a.nome}</td><td>${a.username}</td><td>${a.cpf}</td>
          <td><button class="btn btn-sm btn-outline-danger" onclick="delAluno(${a.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('');
      } catch(e) { console.error(e); }
    }
    function resetCursoForm() {
      const f = document.getElementById('form-curso'); f.reset(); f.id.value = '';
    }
    function editCurso(c) {
      const f = document.getElementById('form-curso');
      ['id','curso','descricao','carga_horaria','nivel','categoria','preco','imagem','status'].forEach(k => f[k].value = c[k] ?? '');
      new bootstrap.Modal(document.getElementById('modal-curso')).show();
    }
    async function delCurso(id) {
      if (!confirm('Excluir curso?')) return;
      try {
        await API.deleteCurso(id);
        showToast('Curso excluído com sucesso.', 'success');
        loadCursos();
      } catch(e) { showToast(`Não foi possível excluir o curso: ${e.message}`, 'error'); }
    }
    async function delAluno(id) {
      if (!confirm('Excluir aluno?')) return;
      try {
        await API.deleteAluno(id);
        showToast('Aluno excluído com sucesso.', 'success');
        loadAlunos();
      } catch(e) { showToast(`Não foi possível excluir o aluno: ${e.message}`, 'error'); }
    }
    window.editCurso = editCurso; window.delCurso = delCurso; window.delAluno = delAluno; window.resetCursoForm = resetCursoForm;
    document.getElementById('form-curso').addEventListener('submit', async e => {
      e.preventDefault();
      if (!validateRequired(e.target)) return;
      const fd = new FormData(e.target);
      const payload = {
        curso: fd.get('curso'), descricao: fd.get('descricao'),
        carga_horaria: Number(fd.get('carga_horaria')), nivel: fd.get('nivel'),
        categoria: fd.get('categoria'), preco: String(fd.get('preco')),
        imagem: fd.get('imagem') || '', status: fd.get('status') || 'ativo'
      };
      const id = fd.get('id');
      try {
        if (id) await API.updateCurso(id, payload);
        else await API.createCurso(payload);
        showToast(id ? 'Curso atualizado com sucesso!' : 'Curso criado com sucesso!', 'success');
        bootstrap.Modal.getInstance(document.getElementById('modal-curso')).hide();
        loadCursos();
      } catch(err) { showToast(`Erro ao salvar curso: ${err.message}`, 'error'); }
    });
    loadCursos(); loadAlunos();
  </script>
</body>
</html>
