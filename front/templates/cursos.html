<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cursos - Escola Tecno Brasília</title>
  <meta name="description" content="Catálogo completo de cursos da Escola Tecno Brasília.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="/front/assets/style.css" rel="stylesheet">
</head>
<body data-page="cursos">
  <div id="navbar-mount"></div>
  <main style="padding-top:100px">
    <div class="container">
      <div class="section-title">
        <h2>Nossos Cursos</h2>
        <p>Encontre o curso ideal para sua carreira.</p>
      </div>
      <!-- FILTROS -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="text" id="f-busca" class="form-control" placeholder="Buscar por nome...">
        </div>
        <div class="col-md-3">
          <select id="f-categoria" class="form-select">
            <option value="">Todas categorias</option>
            <option>Programação</option>
            <option>Dados</option>
            <option>Cloud</option>
            <option>Design</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="f-nivel" class="form-select">
            <option value="">Todos níveis</option>
            <option>Iniciante</option>
            <option>Intermediário</option>
            <option>Avançado</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" onclick="loadCursos()"><i class="fas fa-filter"></i> Filtrar</button>
        </div>
      </div>
      <div id="cursos-grid" class="row g-4">
        <div class="col-12 text-center"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/front/static/api.js"></script>
  <script src="/front/static/main.js"></script>
  <script>

    mountLayout('cursos');

    function erroBonito(mensagem) {
      return `
        <div class="col-12">
          <div style="
            background:#fdecea; border-left:4px solid #dc3545; color:#b02a37;
            border-radius:10px; padding:18px 20px; display:flex; gap:14px;
            align-items:flex-start; max-width:560px; margin:0 auto;
          ">
            <i class="fas fa-circle-exclamation" style="font-size:1.4rem; margin-top:2px;"></i>
            <div>
              <strong>Não foi possível carregar os cursos.</strong>
              <div class="small mt-1">${mensagem}</div>
            </div>
          </div>
        </div>`;
    }

    function vazioBonito() {
      return `
        <div class="col-12 text-center text-muted py-4">
          <i class="fas fa-magnifying-glass fa-2x mb-3"></i>
          <p class="mb-0">Nenhum curso encontrado com esses filtros.</p>
        </div>`;
    }

    async function loadCursos() {
    const grid = document.getElementById('cursos-grid');
    // Exibe o spinner de carregamento
    grid.innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-primary"></div></div>';
    
    try {
        // 1. Inicializa os parâmetros padrão exigidos/aceitos pela paginação da API
        const params = { 
        limit: 100,
        offset: 0 
        };
        
        // 2. Captura os elementos do DOM de forma segura
        const busca = document.getElementById('f-busca')?.value?.trim();
        const categoria = document.getElementById('f-categoria')?.value?.trim();
        const nivel = document.getElementById('f-nivel')?.value?.trim();

        // 3. Alimenta os parâmetros dinamicamente (só envia o que foi preenchido)
        if (busca) params.curso = busca;
        if (categoria) params.categoria = categoria;
        if (nivel) params.nivel = nivel;

        // 4. Faz a requisição para a API
        // (Certifique-se de que a sua classe/objeto 'API' esteja enviando o Token de Autenticação)
        const data = await API.getCursos(params);
        const cursos = data.cursos || [];

        // 5. Se a lista vier vazia, renderiza o aviso amigável
        if (!cursos.length) { 
        grid.innerHTML = vazioBonito(); 
        return; 
        }

        // 6. Renderiza os cards na tela
        grid.innerHTML = cursos.map(c => `
        <div class="col-md-6 col-lg-4">
            <div class="card curso-card">
            <img src="${c.imagem || 'https://placehold.co/600x400?text=Curso'}" alt="${c.curso}">
            <div class="card-body">
                <div class="mb-2">
                <span class="badge bg-primary me-1">${c.nivel || 'N/A'}</span>
                <span class="badge bg-secondary">${c.categoria || 'N/A'}</span>
                </div>
                <h5>${c.curso}</h5>
                <p class="text-truncate">${c.descricao || 'Sem descrição disponível.'}</p>
                <p class="small text-muted"><i class="far fa-clock"></i> ${c.carga_horaria}h</p>
                <div class="d-flex justify-content-between align-items-center">
                <strong class="text-primary">${brl(c.preco)}</strong>
                <div>
                    <button class="btn btn-sm btn-outline-primary" onclick='addToCart(${JSON.stringify(c).replace(/'/g,"&apos;")})'>
                    <i class="fas fa-cart-plus"></i>
                    </button>
                    <a href="curso-detalhe.html?id=${c.id}" class="btn btn-sm btn-primary">Ver</a>
                </div>
                </div>
            </div>
            </div>
        </div>`).join('');
        
    } catch(e) {
        // Tratamento de erro visual para o usuário
        grid.innerHTML = erroBonito(e.message);
    }
    }

    // Executa a listagem assim que a tela carrega
    loadCursos();
  </script>
</body>
</html>
