<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalhes do Curso - Tecno Brasília</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="/assets/style.css" rel="stylesheet">
</head>
<body data-page="cursos">
  <div id="navbar-mount"></div>
  <main style="padding-top:100px">
    <div class="container">
      <div id="curso-detalhe">
        <div class="text-center"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/api.js"></script>
  <script src="/static/main.js"></script>
  <script>
    mountLayout('cursos');

    function erroBonito(titulo, mensagem) {
      return `
        <div style="
          background:#fdecea; border-left:4px solid #dc3545; color:#b02a37;
          border-radius:10px; padding:20px 22px; display:flex; gap:14px;
          align-items:flex-start; max-width:560px; margin:40px auto;
        ">
          <i class="fas fa-circle-exclamation" style="font-size:1.4rem; margin-top:2px;"></i>
          <div>
            <strong>${titulo}</strong>
            ${mensagem ? `<div class="small mt-1">${mensagem}</div>` : ''}
          </div>
        </div>`;
    }

    (async () => {
      const id = new URLSearchParams(location.search).get('id');
      const box = document.getElementById('curso-detalhe');
      if (!id) { box.innerHTML = erroBonito('Curso não encontrado.', 'Verifique o link e tente novamente.'); return; }
      try {
        const data = await API.getCursos({ limit: 100 });
        const c = (data.cursos || []).find(x => String(x.id) === String(id));
        if (!c) { box.innerHTML = erroBonito('Curso não encontrado.', 'Ele pode ter sido removido ou o link está incorreto.'); return; }
        document.title = `${c.curso} - Tecno Brasília`;
        box.innerHTML = `
          <div class="row g-4">
            <div class="col-md-6">
              <img src="${c.imagem || 'https://placehold.co/800x500?text=Curso'}" class="img-fluid rounded shadow" alt="${c.curso}">
            </div>
            <div class="col-md-6">
              <span class="badge bg-primary">${c.nivel}</span>
              <span class="badge bg-secondary">${c.categoria}</span>
              <h1 class="mt-3">${c.curso}</h1>
              <p class="lead">${c.descricao}</p>
              <ul class="list-unstyled">
                <li><i class="far fa-clock me-2 text-primary"></i> Carga horária: ${c.carga_horaria}h</li>
                <li><i class="fas fa-signal me-2 text-primary"></i> Nível: ${c.nivel}</li>
                <li><i class="fas fa-tag me-2 text-primary"></i> Categoria: ${c.categoria}</li>
                <li><i class="fas fa-check-circle me-2 text-primary"></i> Status: ${c.status}</li>
              </ul>
              <h2 class="text-primary mt-4">${brl(c.preco)}</h2>
              <button class="btn btn-primary btn-lg mt-3" onclick='addToCart(${JSON.stringify(c).replace(/'/g,"&apos;")})'>
                <i class="fas fa-cart-plus me-2"></i>Adicionar ao carrinho
              </button>
              <a href="matricula.html" class="btn btn-secondary btn-lg mt-3">Matricular agora</a>
            </div>
          </div>`;
      } catch(e) {
        box.innerHTML = erroBonito('Não foi possível carregar os detalhes do curso.', e.message);
      }
    })();
  </script>
</body>
</html>
